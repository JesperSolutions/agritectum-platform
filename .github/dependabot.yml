version: 2
updates:
  # npm (root app + Vite/React/Firebase client)
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '07:00'
      timezone: 'Europe/Copenhagen'
    open-pull-requests-limit: 5
    labels: ['dependencies', 'area:ci']
    commit-message:
      prefix: 'chore(deps)'
    groups:
      react:
        patterns: ['react', 'react-dom', 'react-router*', 'react-intl']
      firebase:
        patterns: ['firebase', 'firebase-*', '@firebase/*']
      radix:
        patterns: ['@radix-ui/*']
      test-tooling:
        patterns: ['vitest', '@testing-library/*', 'jest-axe', 'jsdom']
      build-tooling:
        patterns:
          [
            'vite',
            '@vitejs/*',
            'typescript',
            'eslint*',
            'prettier',
            'tailwindcss',
            'postcss',
            'autoprefixer',
          ]

  # Firebase Functions
  - package-ecosystem: 'npm'
    directory: '/functions'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '07:00'
      timezone: 'Europe/Copenhagen'
    open-pull-requests-limit: 5
    labels: ['dependencies', 'area:firebase']
    commit-message:
      prefix: 'chore(functions-deps)'

  # GitHub Actions
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '07:00'
      timezone: 'Europe/Copenhagen'
    labels: ['dependencies', 'area:ci']
    commit-message:
      prefix: 'chore(actions)'
