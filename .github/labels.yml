# Canonical label set for agritectum-platform.
# Apply with the `labels-sync` workflow or `gh label create`.

# --- Type
- name: 'type:bug'
  color: 'd73a4a'
  description: 'Something is broken'
- name: 'type:feature'
  color: 'a2eeef'
  description: 'New feature or request'
- name: 'type:refactor'
  color: 'c5def5'
  description: 'Internal change, no behavior change'
- name: 'type:perf'
  color: '1d76db'
  description: 'Performance improvement'
- name: 'type:docs'
  color: '0075ca'
  description: 'Documentation only'
- name: 'type:chore'
  color: 'cfd3d7'
  description: 'Tooling, build, CI'
- name: 'type:a11y'
  color: '5319e7'
  description: 'Accessibility / WCAG'
- name: 'type:security'
  color: 'b60205'
  description: 'Security-sensitive'

# --- Priority
- name: 'priority:p0'
  color: 'b60205'
  description: 'Blocker — data loss, auth broken, outage'
- name: 'priority:p1'
  color: 'd93f0b'
  description: 'Major — ship within days'
- name: 'priority:p2'
  color: 'fbca04'
  description: 'Normal — ship within the iteration'
- name: 'priority:p3'
  color: '0e8a16'
  description: 'Nice-to-have — backlog'

# --- Status
- name: 'status:triage'
  color: 'ededed'
  description: 'Needs triage'
- name: 'status:ready'
  color: 'c2e0c6'
  description: 'Ready to work on'
- name: 'status:in-progress'
  color: 'fbca04'
  description: 'Being worked on'
- name: 'status:blocked'
  color: 'b60205'
  description: 'Blocked by external dependency'
- name: 'status:needs-info'
  color: 'd4c5f9'
  description: 'Waiting on reporter'
- name: 'status:wontfix'
  color: 'ffffff'
  description: 'Will not be fixed'

# --- Area
- name: 'area:auth'
  color: '1d76db'
  description: 'Auth, onboarding, sessions'
- name: 'area:inspector'
  color: '1d76db'
  description: 'Inspector / ReportForm'
- name: 'area:portal'
  color: '1d76db'
  description: 'Customer portal'
- name: 'area:admin'
  color: '1d76db'
  description: 'Branch / platform admin'
- name: 'area:offers'
  color: '1d76db'
  description: 'Offers & Stripe'
- name: 'area:email'
  color: '1d76db'
  description: 'Email (MailerSend / mail collection)'
- name: 'area:offline-pwa'
  color: '1d76db'
  description: 'Offline queue, service worker, PWA'
- name: 'area:i18n'
  color: '1d76db'
  description: 'Translations, locales'
- name: 'area:firebase'
  color: '1d76db'
  description: 'Functions, Firestore, Storage, rules'
- name: 'area:ci'
  color: '1d76db'
  description: 'GitHub Actions, tooling'

# --- Meta
- name: 'good first issue'
  color: '7057ff'
  description: 'Suitable for newcomers'
- name: 'help wanted'
  color: '008672'
  description: 'Extra attention welcome'
- name: 'dependencies'
  color: '0366d6'
  description: 'Dependency update'
- name: 'breaking-change'
  color: 'b60205'
  description: 'Introduces a breaking change'
