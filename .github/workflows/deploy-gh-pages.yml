name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # NOTE: GitHub Pages must be enabled manually in repo Settings → Pages
      # (Source: GitHub Actions). The workflow's GITHUB_TOKEN cannot create the
      # Pages site itself ("Resource not accessible by integration"), so we set
      # enablement: false and assume Pages has been enabled out-of-band.
      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          enablement: false

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './docs'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
