name: Accessibility issue
description: Report a WCAG / a11y violation or barrier.
title: '[a11y]: '
labels: ['type:a11y', 'status:triage']
body:
  - type: dropdown
    id: wcag
    attributes:
      label: WCAG criterion (if known)
      options:
        - '1.1.1 Non-text content (alt text)'
        - '1.3.1 Info and relationships'
        - '1.4.3 Contrast (minimum)'
        - '2.1.1 Keyboard'
        - '2.4.3 Focus order'
        - '2.4.7 Focus visible'
        - '3.3.1 Error identification'
        - '3.3.2 Labels or instructions'
        - '4.1.2 Name, role, value'
        - 'Other / unknown'
  - type: dropdown
    id: assistive
    attributes:
      label: Assistive tech used (if any)
      options:
        - 'None (visual/keyboard inspection)'
        - 'NVDA'
        - 'JAWS'
        - 'VoiceOver (macOS)'
        - 'VoiceOver (iOS)'
        - 'TalkBack (Android)'
        - 'axe DevTools / Lighthouse'
  - type: textarea
    id: where
    attributes:
      label: Where — URL, component, or file:line
    validations:
      required: true
  - type: textarea
    id: barrier
    attributes:
      label: Describe the barrier
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
